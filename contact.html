<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Emma Siffredi</title>
    <link rel="icon" type="image/png" href="image/FAVICON.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html#home" class="logo">
                <img src="image/logo.png" alt="Emma Siffredi" class="logo-img">
            </a>
            <button class="burger-menu" id="burgerMenu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#projects" class="nav-link">Mes projets</a></li>
                <li><a href="amelioration.html" class="nav-link">Mon amélioration</a></li>
                <li><a href="apropos.html" class="nav-link">À propos</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact-section" style="margin-top: 60px; min-height: calc(100vh - 60px);">
        <div class="contact-container">
            <h1 style="font-size: 3rem; margin-bottom: 2rem; color: white;">Contact</h1>
            <div style="max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 15px;">
                <form style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; color: white; font-weight: 600;">Nom</label>
                        <input type="text" placeholder="Votre nom" style="width: 100%; padding: 0.8rem; border: none; border-radius: 5px; font-family: 'Poppins', sans-serif;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; color: white; font-weight: 600;">Email</label>
                        <input type="email" placeholder="votre.email@exemple.com" style="width: 100%; padding: 0.8rem; border: none; border-radius: 5px; font-family: 'Poppins', sans-serif;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; color: white; font-weight: 600;">Message</label>
                        <textarea placeholder="Votre message..." rows="5" style="width: 100%; padding: 0.8rem; border: none; border-radius: 5px; font-family: 'Poppins', sans-serif; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" style="background: var(--pink-dark); color: white; padding: 1rem; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: 'Poppins', sans-serif; font-size: 1rem;">
                        Envoyer
                    </button>
                </form>

                <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.3);">
                    <h2 style="color: white; margin-bottom: 1rem;">Autre Information</h2>
                    <p style="color: white; margin-bottom: 0.5rem;">📧 Email: emma.siffredi@exemple.com</p>
                    <p style="color: white; margin-bottom: 0.5rem;">📱 Téléphone: +33 6 XX XX XX XX</p>
                    <p style="color: white;">📍 Localisation: Troyes, France</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 Emma Siffredi</p>
            <div class="social-links">
                <a href="#linkedin" class="social-icon">in</a>
                <a href="#email" class="social-icon">✉</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
